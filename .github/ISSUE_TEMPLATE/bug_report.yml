name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug.
        Please fill in all required fields to help us reproduce the issue.

  - type: input
    id: version
    attributes:
      label: Grimoire version
      description: Output of `grimoire --version`
      placeholder: "v0.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS
        - Linux
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command executed
      description: The exact command that caused the issue
      render: shell
      placeholder: "grimoire new MyApp --package com.example.myapp --lang kotlin"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: "I expected..."
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste the full terminal output including any error messages
      render: shell
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Output of `grimoire doctor` if available, otherwise Java / Gradle / Go versions
      render: shell
      placeholder: |
        java version: 17.0.x
        gradle: 8.x
        go: 1.22.x
        ANDROID_HOME: C:\Users\...